<!DOCTYPE html>

<html>
<head>
<title>Kidney Tumor Detection</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#1e3c72,#2a5298);
text-align:center;
}

.container{
width:500px;
margin:80px auto;
background:#dbeafe;
padding:30px;
border-radius:10px;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
margin:5px;
}

.logout{
background:red;
}

</style>

</head>

<body>

<div style="text-align:right; margin:20px;">
<a href="/logout">
<button class="logout">Logout</button>
</a>
</div>

<div class="container">

<h2>Kidney Tumor Detection System</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="file" required>

<br><br>

<button type="submit">Detect Tumor</button>

</form>

{% if result %}

<h3>Result : {{ result }}</h3>

<img src="{{ image }}" width="200">

<br><br>

<a href="/">
<button>Back</button>
</a>

{% endif %}

</div>

</body>
</html>
